<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ladybug Gamez</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0606;
      --bg-card: rgba(30, 12, 12, 0.85);
      --border-glow: rgba(255, 80, 60, 0.15);
      --neon-red: #ff3b30;
      --neon-orange: #ff9500;
      --neon-yellow: #ffcc00;
      --neon-pink: #ff2d55;
      --neon-white: #fff5f0;
      --text-main: #f0e8e6;
      --text-dim: #a08888;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === ANIMATED BACKGROUND === */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 59, 48, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 59, 48, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      z-index: 0;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .bg-glow.glow-1 {
      top: -200px;
      left: -100px;
      background: var(--neon-red);
    }
    .bg-glow.glow-2 {
      bottom: -200px;
      right: -100px;
      background: var(--neon-orange);
      animation-delay: -10s;
    }
    .bg-glow.glow-3 {
      top: 40%;
      left: 50%;
      width: 400px;
      height: 400px;
      background: var(--neon-yellow);
      opacity: 0.06;
      animation-delay: -5s;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, 30px) scale(1.1); }
      100% { transform: translate(-20px, 50px) scale(0.95); }
    }

    /* === LAYOUT === */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .logo-bug {
      width: 52px;
      height: 52px;
      align-self: center;
    }

    .logo-word {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--neon-orange), var(--neon-red), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }

    .gamez-wrap {
      position: relative;
      display: inline-block;
    }

    /* A's right leg → underline → Z's bottom leg */
    .gamez-wrap::after {
      content: '';
      position: absolute;
      left: 35%;
      right: 0;
      top: 100%;
      height: 10px;
      border-left: 2.5px solid;
      border-bottom: 2.5px solid;
      border-right: 2.5px solid;
      border-top: none;
      border-image: linear-gradient(to right, var(--neon-orange), var(--neon-red), var(--neon-pink)) 1;
    }

    /* A's left leg */
    .gamez-wrap::before {
      content: '';
      position: absolute;
      left: 23%;
      top: 100%;
      width: 2.5px;
      height: 7px;
      background: var(--neon-orange);
    }

    .tagline {
      margin-top: 20px;
      font-size: 1.05rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* === PARTICLE CANVAS === */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* === GAME GRID === */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    /* === GAME CARD === */
    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 32px 28px 28px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, var(--card-accent), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: transparent;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 0 40px var(--card-glow);
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      background: var(--card-icon-bg);
      box-shadow: 0 4px 20px var(--card-glow);
      transition: transform 0.35s ease;
    }

    .card:hover .card-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .card-title {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    .card-desc {
      color: var(--text-dim);
      font-size: 0.92rem;
      line-height: 1.6;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .tag {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .card-play {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--card-accent);
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.3s ease;
    }

    .card:hover .card-play {
      opacity: 1;
      transform: translateX(0);
    }

    .card-play .arrow {
      transition: transform 0.3s ease;
    }

    .card:hover .card-play .arrow {
      transform: translateX(4px);
    }

    /* === COMING SOON CARDS === */
    .card.coming-soon {
      --card-accent: rgba(255, 255, 255, 0.15);
      --card-glow: rgba(255, 255, 255, 0.03);
      --card-icon-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
      cursor: default;
      opacity: 0.45;
    }

    .card.coming-soon:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--border-glow);
    }

    .card.coming-soon:hover::before { opacity: 0; }
    .card.coming-soon:hover .card-icon { transform: none; }

    .coming-soon-badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 20px;
      display: inline-block;
    }

    /* === FOOTER === */
    .footer {
      text-align: center;
      margin-top: 70px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .footer p {
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .footer .brand {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      background: linear-gradient(135deg, var(--neon-orange), var(--neon-red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .page { padding: 40px 16px 60px; }
      .header { margin-bottom: 40px; }
      .games { grid-template-columns: 1fr; gap: 20px; }
      .card { padding: 24px 20px 20px; }
      .card-play { opacity: 1; transform: translateX(0); }
      .logo-bug { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>
  <!-- Background effects -->
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>
  <canvas id="particles"></canvas>

  <div class="page">
    <header class="header">
      <h1 class="logo-row">
        <span class="logo-word">LADYBUG</span>
        <canvas class="logo-bug" id="ladybug-logo" width="52" height="52"></canvas>
        <span class="logo-word gamez-wrap">GAMEZ</span>
      </h1>
      <p class="tagline">Select your game</p>
    </header>

    <div class="games">

      <!-- COMING SOON PLACEHOLDER -->
      <div class="card coming-soon">
        <div class="card-icon">🎮</div>
        <h2 class="card-title">Games Coming</h2>
        <p class="card-desc">
          New games are being built. Stay tuned for the first additions to the arcade.
        </p>
        <span class="coming-soon-badge">Coming Soon</span>
      </div>

    </div>

  </div>

  <script>
    // Floating particle system
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 50;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
        this.y = Math.random() * canvas.height;
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 10;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = -(Math.random() * 0.4 + 0.1);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.4 + 0.1;
        const colors = ['255,59,48', '255,149,0', '255,204,0'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.y < -10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    // Draw ladybug logo
    (function() {
      const c = document.getElementById('ladybug-logo');
      const x = c.getContext('2d');
      const W = 52, CX = W / 2, CY = W / 2 + 4;

      // Body (red oval)
      x.shadowColor = '#ff3b30';
      x.shadowBlur = 6;
      x.fillStyle = '#e02020';
      x.beginPath();
      x.ellipse(CX, CY, 16, 18, 0, 0, Math.PI * 2);
      x.fill();

      // Center line
      x.shadowBlur = 0;
      x.strokeStyle = '#1a1a1a';
      x.lineWidth = 1.8;
      x.beginPath();
      x.moveTo(CX, CY - 18);
      x.lineTo(CX, CY + 18);
      x.stroke();

      // 4 spots per side, all same size (radius 3)
      x.fillStyle = '#1a1a1a';
      const spotR = 3;
      const spots = [
        // Left side (4 dots)
        [CX - 7, CY - 10],
        [CX - 10, CY - 2],
        [CX - 9, CY + 6],
        [CX - 6, CY + 13],
        // Right side (4 dots, mirrored)
        [CX + 7, CY - 10],
        [CX + 10, CY - 2],
        [CX + 9, CY + 6],
        [CX + 6, CY + 13],
      ];
      spots.forEach(([sx, sy]) => {
        x.beginPath();
        x.arc(sx, sy, spotR, 0, Math.PI * 2);
        x.fill();
      });

      // Head
      x.fillStyle = '#1a1a1a';
      x.beginPath();
      x.arc(CX, CY - 18, 8, 0, Math.PI * 2);
      x.fill();

      // Eyes (white with black pupils)
      x.fillStyle = '#ffffff';
      x.beginPath();
      x.arc(CX - 4, CY - 20, 2.5, 0, Math.PI * 2);
      x.fill();
      x.beginPath();
      x.arc(CX + 4, CY - 20, 2.5, 0, Math.PI * 2);
      x.fill();
      x.fillStyle = '#1a1a1a';
      x.beginPath();
      x.arc(CX - 3.5, CY - 20, 1.2, 0, Math.PI * 2);
      x.fill();
      x.beginPath();
      x.arc(CX + 4.5, CY - 20, 1.2, 0, Math.PI * 2);
      x.fill();

      // Smile
      x.strokeStyle = '#ffffff';
      x.lineWidth = 1.2;
      x.lineCap = 'round';
      x.beginPath();
      x.arc(CX, CY - 16, 3, 0.2, Math.PI - 0.2);
      x.stroke();

      // Antennae
      x.strokeStyle = '#1a1a1a';
      x.lineWidth = 1.3;
      x.beginPath();
      x.moveTo(CX - 3, CY - 25);
      x.quadraticCurveTo(CX - 12, CY - 36, CX - 8, CY - 38);
      x.stroke();
      x.beginPath();
      x.moveTo(CX + 3, CY - 25);
      x.quadraticCurveTo(CX + 12, CY - 36, CX + 8, CY - 38);
      x.stroke();

      // Antenna tips
      x.fillStyle = '#1a1a1a';
      x.beginPath();
      x.arc(CX - 8, CY - 38, 1.8, 0, Math.PI * 2);
      x.fill();
      x.beginPath();
      x.arc(CX + 8, CY - 38, 1.8, 0, Math.PI * 2);
      x.fill();
    })();
  </script>
</body>
</html>
